<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense-Budget-Visualizer</title>
    <link rel="stylesheet" href="./css/style.css" />
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="app-header">
        <h1>Expense Tracker</h1>
        <button id="theme-toggle" aria-label="Toggle dark/light mode">
          🌙
        </button>
      </header>

      <!-- Balance Card -->
      <section class="balance-card" aria-label="Total balance">
        <p class="balance-label">Total Spent</p>
        <h2 class="balance-amount" id="total-balance">$0.00</h2>
        <p class="limit-warning" id="limit-warning" hidden>
          ⚠️ Spending limit reached!
        </p>
      </section>

      <!-- Add Transaction Form -->
      <section class="form-section">
        <h3>Add Transaction</h3>
        <form id="transaction-form" novalidate>
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input
              type="text"
              id="item-name"
              placeholder="e.g. Coffee"
              maxlength="50"
            />
            <span class="error-msg" id="name-error"></span>
          </div>
          <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input
              type="number"
              id="amount"
              placeholder="0.00"
              min="0.01"
              step="0.01"
            />
            <span class="error-msg" id="amount-error"></span>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option value="">-- Select --</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚌 Transport</option>
              <option value="Fun">🎮 Fun</option>
              <option value="Health">💊 Health</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Other">📦 Other</option>
            </select>
            <span class="error-msg" id="category-error"></span>
          </div>
          <div class="form-group">
            <label for="spending-limit"
              >Monthly Spending Limit ($) <small>(optional)</small></label
            >
            <input
              type="number"
              id="spending-limit"
              placeholder="e.g. 500"
              min="1"
              step="1"
            />
          </div>
          <button type="submit" class="btn-add">+ Add Transaction</button>
        </form>
      </section>

      <!-- Chart -->
      <section class="chart-section" aria-label="Spending chart">
        <h3>Spending by Category</h3>
        <div class="chart-wrapper">
          <canvas
            id="expense-chart"
            aria-label="Pie chart of expenses by category"
            role="img"
          ></canvas>
          <p class="chart-empty" id="chart-empty">
            No data yet. Add a transaction!
          </p>
        </div>
      </section>

      <!-- Transaction List -->
      <section class="list-section">
        <div class="list-header">
          <h3>Transactions</h3>
          <div class="list-controls">
            <select id="sort-select" aria-label="Sort transactions">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="highest">Highest Amount</option>
              <option value="lowest">Lowest Amount</option>
            </select>
            <button
              id="clear-all"
              class="btn-clear"
              aria-label="Clear all transactions"
            >
              Clear All
            </button>
          </div>
        </div>
        <ul
          id="transaction-list"
          class="transaction-list"
          aria-label="Transaction list"
        >
          <li class="empty-state" id="empty-state">No transactions yet.</li>
        </ul>
      </section>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
